version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - copyloopvar
    - errcheck
    - forbidigo
    - funlen
    - gocritic
    - gocyclo
    - govet
    - ineffassign
    - misspell
    - nakedret
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    forbidigo:
      forbid:
        - pattern: ^fmt\.Print.*$
          msg: use log/slog for diagnostics; user-facing CLI text belongs in cmd/ output helpers
    funlen:
      lines: 40
      statements: 25
    gocyclo:
      min-complexity: 12
    revive:
      rules:
        - name: exported
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - forbidigo
          - funlen
          - gocyclo
          - unparam
        path: _test\.go
      - linters:
          - revive
        text: stutters
      # hostcaller.go is cgo glue: gocritic's dupSubExpr false-positives on the cgo
      # call wrapper, and Call is intentionally linear unsafe-pointer boilerplate.
      - linters:
          - funlen
          - gocritic
        path: hostcaller\.go
      # device/device_*.go are the per-OS hardware readers (cgo / syscall boilerplate);
      # held to build/vet, not the heavier semantic linters that false-positive on platform
      # glue. Excludes the no-op fallback (device_nodevice.go) too, which is trivial.
      - linters:
          - errcheck
          - funlen
          - gocritic
          - gocyclo
          - unparam
        path: device/device_.*\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - oblikovati
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
