# SonarCloud analysis scope for oblikovati-spacemouse.
#
# NOTE: this project uses SonarCloud *Automatic Analysis*, which does NOT read this
# file for cpd/issue exclusions — the same scope below is also configured in the
# SonarCloud project settings (Administration > Analysis Scope), which is what Automatic
# Analysis honours. This file keeps the intent in-repo and applies as-is if a CI scanner
# is ever used instead.
#
# The pure, testable layers (navigate/, bridge/, device/sample.go, device/hidreport.go)
# carry the coverage and are held to the full ruleset. The per-OS hardware readers
# (device/device_{linux,windows,darwin}.go) are platform glue that cannot run in CI and
# is verified on hardware; they are scoped off duplication and the production-targeted
# maintainability rules but still analyzed for bugs and vulnerabilities. Test
# scaffolding repeats setup, so it is scoped off copy/paste and style rules.

# Duplication: ignore the per-OS readers and test scaffolding.
sonar.cpd.exclusions=device/device_linux.go,device/device_windows.go,device/device_darwin.go,**/*_test.go

# Maintainability/style rules that target production code, scoped off the platform glue/tests.
sonar.issue.ignore.multicriteria=os1,os2,os3,t1,t2
sonar.issue.ignore.multicriteria.os1.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.os1.resourceKey=device/device_*.go
sonar.issue.ignore.multicriteria.os2.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.os2.resourceKey=device/device_*.go
sonar.issue.ignore.multicriteria.os3.ruleKey=go:S107
sonar.issue.ignore.multicriteria.os3.resourceKey=device/device_*.go
sonar.issue.ignore.multicriteria.t1.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.t1.resourceKey=**/*_test.go
sonar.issue.ignore.multicriteria.t2.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.t2.resourceKey=**/*_test.go
